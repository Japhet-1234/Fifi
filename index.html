                                        <textarea rows={4} className="w-full bg-transparent border-b border-white/20 py-2 focus:border-[#5A5A40] outline-none transition-colors resize-none" />
                                    </div>
                                    <button className="w-full bg-[#5A5A40] text-white py-4 rounded-full font-sans font-bold uppercase tracking-widest text-sm hover:bg-[#4A4A30] transition-all mt-4">
                                        {t.contact.send}
                                    </button>
                                </form>
                            </div>
                        </div>
                        
                        <div className="max-w-7xl mx-auto px-6 mt-24 pt-12 border-t border-white/10 flex flex-col md:flex-row justify-between items-center text-xs opacity-40 font-sans tracking-widest">
                            <p>{t.footer.rights}</p>
                            <div className="flex space-x-8 mt-4 md:mt-0">
                                <a href="#" className="hover:text-white transition-colors">{t.footer.privacy}</a>
                                <a href="#" className="hover:text-white transition-colors">{t.footer.terms}</a>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
